<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Peer City Spectral Graphs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
      background: #ffffff;
    }
    h1 {
      margin-top: 0;
    }
    .controls {
      margin: 16px 0 20px 0;
    }
    iframe {
      width: 100%;
      height: 900px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
    }
    .note {
      color: #555;
      font-size: 0.95rem;
      margin-top: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Peer City Spectral Clustering Graphs</h1>

  <div class="controls">
    <label for="period">Select period:</label>
    <select id="period">
      <option value="plots/spectral_2010_2014.html" selected>2010–2014</option>
      <option value="plots/spectral_2015_2019.html">2015–2019</option>
      <option value="plots/spectral_2020_2024.html">2020–2024</option>
    </select>
  </div>

  <iframe
    id="graphFrame"
    src="plots/spectral_2010_2014.html"
    title="Interactive 3D spectral graph">
  </iframe>

  <p class="note">
    Interactive 3D graph generated from the project’s spectral clustering pipeline.
  </p>

  <script>
    const periodSelect = document.getElementById("period");
    const graphFrame = document.getElementById("graphFrame");

    periodSelect.addEventListener("change", () => {
      graphFrame.src = periodSelect.value;
    });
  </script>
</body>
</html>
